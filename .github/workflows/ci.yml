name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - release

jobs:
  test:
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check formatting
        run: black --check .

      - name: Run linter
        run: flake8 .

      - name: Run tests
        run: pytest
