name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - release
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - develop
      - release

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check formatting
        run: black --check src tests

      - name: Run linter
        run: flake8 src tests

      - name: Run tests
        run: pytest -q --junitxml=test-results/junit.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/junit.xml

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit test report
          path: test-results/junit.xml
          reporter: java-junit

  deploy:
    if: github.ref == 'refs/heads/release'
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: dAI-macos.zip
          - os: ubuntu-latest
            artifact: dAI-linux.zip

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install CPU-only torch (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable (PyInstaller)
        run: |
          pyinstaller --noconfirm --windowed --onefile \
            --name dAI \
            --add-data "models:models" \
            app.py

      - name: Package app (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --keepParent dist/dAI.app dist/dAI-macos.zip

      - name: Package app (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist && zip -r dAI-linux.zip dAI

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: dAI v1.0.${{ github.run_number }}
          files: dist/${{ matrix.artifact }}
