name: CI/CD Pipeline

on:
  push:
    branches:
      - devel
      - release

jobs:
  test:
    if: github.ref == 'refs/heads/devel'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  deploy:
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: echo "Building..."

      - name: Deploy
        run: echo "Deploying..."
